name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Find and Build
        run: |
          # Find the package.json that belongs to your site
          TARGET_DIR=$(find . -maxdepth 2 -name "package.json" -exec grep -l "dependencies" {} + | head -n 1 | xargs dirname)
          echo "Targeting directory: $TARGET_DIR"
          cd "$TARGET_DIR"
          npm install --legacy-peer-deps
          npm install ajv@^8 --legacy-peer-deps
          # BYPASS STRICT MODE WARNINGS
          CI=false npm run build
          # Ensure the output is moved to a known location
          mkdir -p $GITHUB_WORKSPACE/deploy_ready
          cp -r dist/* $GITHUB_WORKSPACE/deploy_ready/ || cp -r build/* $GITHUB_WORKSPACE/deploy_ready/ || true
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy_ready'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4