name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Find and Build
        run: |
          # Search for the folder containing vite.config.js
          TARGET_DIR=$(find . -name "vite.config.js" -exec dirname {} \;)
          echo "Found project in: $TARGET_DIR"
          cd "$TARGET_DIR"
          npm install
          npm run build
          # Move the results to the root so GitHub can find them
          mkdir -p $GITHUB_WORKSPACE/out_delivery
          cp -r dist/* $GITHUB_WORKSPACE/out_delivery/ || cp -r build/* $GITHUB_WORKSPACE/out_delivery/ || true
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out_delivery'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4